{% extends "base.html" %}
{% block content %}
{% set base_prefix = '/v1/admin' if mode == 'v1_admin' else '/admin' %}
{% set cancel_page = 'teachers' if user.role == 'teacher' else 'students' %}
<h2>Редактирование пользователя</h2>
<form action="" method="post">
  <label>ФИО</label>
  <input type="text" name="full_name" value="{{ user.full_name }}" />

  <label>Логин</label>
  <input type="text" name="login" value="{{ user.email }}" />

  <label>Роль</label>
  <select name="role">
    <option value="student" {% if user.role=='student' %}selected{% endif %}>Студент</option>
    <option value="teacher" {% if user.role=='teacher' %}selected{% endif %}>Преподаватель</option>
    <option value="admin" {% if user.role=='admin' %}selected{% endif %}>Администратор</option>
  </select>

  <label>Преподаватель (для студента)</label>
  <select name="assigned_teacher_id">
    <option value="">-- нет --</option>
    {% for t in teachers %}
      <option value="{{ t.id }}" {% if user.assigned_teacher_id==t.id %}selected{% endif %}>{{ t.full_name }}</option>
    {% endfor %}
  </select>

  <label>Группа (для студента)</label>
  <input type="text" name="student_group" value="{{ user.student_group|default('', true) }}" placeholder="Например: БИ-41.1" />

  <div style="margin-top:12px;">
    <button class="button" type="submit">Сохранить</button>
    <a class="button secondary" href="{{ base_prefix }}/{{ cancel_page }}">Отмена</a>
  </div>
</form>
{% endblock %}

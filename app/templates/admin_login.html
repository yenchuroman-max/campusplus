<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>КампусПлюс СГУГиТ — вход администратора</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/sgugit-mark.png?v=3" />
    <link rel="shortcut icon" href="/favicon.ico?v=3" />
    <link rel="apple-touch-icon" href="/static/img/sgugit-mark.png?v=3" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="card narrow">
        <h2>Вход администратора</h2>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <form method="post" action="{{ login_action if login_action else '/v2/admin/login' }}" class="auth-form">
          <label>Логин</label>
          <input type="text" name="login" value="{{ login if login else '' }}" required />
          <label>Пароль</label>
          <input type="password" name="password" required />
          <button class="button" type="submit">Войти</button>
        </form>
        <details class="auth-help-disclosure">
          <summary class="auth-help-toggle">Забыли пароль?</summary>
          <div class="auth-help">
            <span>Обратитесь к другому администратору системы. Он сможет сбросить пароль и выдать временный пароль для входа.</span>
          </div>
        </details>
      </div>
    </main>
  </body>
</html>

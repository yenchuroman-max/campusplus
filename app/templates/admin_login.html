<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>КампусПлюс СГУГиТ — вход администратора</title>
    <link rel="icon" type="image/png" href="/static/img/sgugit-mark.png" />
    <link rel="shortcut icon" href="/static/img/sgugit-mark.png" />
    <link rel="apple-touch-icon" href="/static/img/sgugit-mark.png" />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="card narrow">
        <h2>Админ-панель — вход</h2>
        {% if error %}<div class="alert">{{ error }}</div>{% endif %}
        <form method="post" action="{{ login_action if login_action else '/v2/admin/login' }}">
          <label>Логин</label>
          <input type="text" name="login" value="{{ login if login else '' }}" required />
          <label>Пароль</label>
          <input type="password" name="password" required />
          <button class="button" type="submit">Войти</button>
        </form>
      </div>
    </main>
  </body>
</html>

services:
  - type: web
    name: campusplus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusplus-db
          property: connectionString
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: "lax"
      - key: BOOTSTRAP_ADMIN_LOGIN
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        value: "CampusPlus Admin"

databases:
  - name: campusplus-db
    databaseName: campusplus
    user: campusplus
    plan: basic-256mb
    storageAutoscalingEnabled: true
